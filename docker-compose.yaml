# ─────────────────────────────────────────────────────────────────────────────
# ANCHOR: configurações compartilhadas entre todos os serviços do Airflow
#
# O bloco abaixo define um "template" que os 3 serviços do Airflow reutilizam
# (init, scheduler e webserver). Isso evita repetir as mesmas configs 3 vezes.
# ─────────────────────────────────────────────────────────────────────────────
x-airflow-common: &airflow-common
  # Usa a imagem customizada definida no Dockerfile (já tem as dependências instaladas)
  build: .
  env_file: .env
  environment:
    # Executor local: roda as tasks no mesmo processo do scheduler (ideal para estudo)
    AIRFLOW__CORE__EXECUTOR: LocalExecutor

    # Conexão com o banco de metadados do Airflow (PostgreSQL)
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow

    # Novas DAGs começam pausadas — você precisa ativar manualmente na UI
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"

    # Desliga as DAGs de exemplo que vêm por padrão (deixa o ambiente mais limpo)
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"

    # Habilita autenticação simples via usuário/senha na API do Airflow
    AIRFLOW__API__AUTH_BACKENDS: "airflow.api.auth.backend.basic_auth"

    # Credenciais da API de câmbio (lidas do arquivo .env)
    # Convenção dlt: SOURCES__SOURCE__<nome_do_source>__<campo>
    SOURCES__SOURCE__FREECURRENCY__API_KEY: ${SOURCES__SOURCE__FREECURRENCY__API_KEY}

    # Configurações do MinIO como destino do dlt (lidas do arquivo .env)
    DESTINATION__FILESYSTEM__BUCKET_URL: ${MINIO_BUCKET_URL}
    DESTINATION__FILESYSTEM__CREDENTIALS__AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
    DESTINATION__FILESYSTEM__CREDENTIALS__AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
    

    # Garante que o Python encontre o módulo /opt/airflow/ingestion
    PYTHONPATH: /opt/airflow

  # Monta pastas locais dentro do container para que mudanças no código
  # sejam refletidas sem precisar rebuildar a imagem
  volumes:
    - ./dags:/opt/airflow/dags           # suas DAGs
    - ./ingestion:/opt/airflow/ingestion # código de ingestão
    - airflow_logs:/opt/airflow/logs     # logs gerados pelo Airflow

  # Só sobe após o PostgreSQL estar saudável
  depends_on:
    postgres:
      condition: service_healthy


services:

  # ─── PostgreSQL ───────────────────────────────────────────────────────────────
  # Banco de dados que o Airflow usa para guardar metadados:
  # histórico de execuções, status das DAGs, variáveis, conexões, etc.
  # ─────────────────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres_data:/var/lib/postgresql/data  # persiste os dados entre reinicializações
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5
      start_period: 5s


  # ─── MinIO ────────────────────────────────────────────────────────────────────
  # Object storage compatível com S3 que roda localmente.
  # É onde os arquivos Parquet gerados pelo dlt serão salvos.
  #
  # Acesse o console web em: http://localhost:9001
  # Usuário e senha estão no arquivo .env (MINIO_ACCESS_KEY / MINIO_SECRET_KEY)
  # ─────────────────────────────────────────────────────────────────────────────
  minio:
    image: minio/minio:RELEASE.2024-11-07T00-52-20Z
    command: server /data --console-address ":9001"
    env_file: .env
    environment:
      MINIO_ROOT_USER: thiago_admin
      MINIO_ROOT_PASSWORD: admin123
    ports:
      - "9000:9000"   # S3 API (usada pelo dlt para gravar arquivos)
      - "9001:9001"   # Console web (interface visual do MinIO)
    volumes:
      - minio_data:/data  # persiste os arquivos entre reinicializações
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      retries: 5
      start_period: 10s


  # ─── MinIO Init ───────────────────────────────────────────────────────────────
  # Serviço temporário que roda uma única vez para criar o bucket no MinIO.
  # Depois que termina, o container para (isso é normal).
  # ─────────────────────────────────────────────────────────────────────────────
  minio-init:
    image: minio/mc:latest
    env_file: .env
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD};
        mc mb --ignore-existing local/currency-raw;
        echo 'Bucket currency-raw criado e pronto.';
       "

  # ─── Airflow Init ─────────────────────────────────────────────────────────────
  # Serviço temporário que roda uma única vez na primeira inicialização.
  # Ele prepara o banco de dados do Airflow e cria o usuário admin.
  # Depois que termina, o container para (isso é normal).
  #
  # Acesse a UI do Airflow em: http://localhost:8080
  # Login: admin / Senha: admin
  # ─────────────────────────────────────────────────────────────────────────────
  airflow-init:
    <<: *airflow-common
    command: >
      bash -c "
        airflow db migrate &&
        airflow users create --username admin --firstname Admin --lastname User --role Admin --email admin@example.com --password admin
      "


  # ─── Airflow Scheduler ────────────────────────────────────────────────────────
  # Responsável por monitorar as DAGs e disparar as tasks no horário certo.
  # Fica rodando em background o tempo todo.
  # ─────────────────────────────────────────────────────────────────────────────
  airflow-scheduler:
    <<: *airflow-common
    command: airflow scheduler
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully


  # ─── Airflow Webserver ────────────────────────────────────────────────────────
  # Interface web do Airflow — onde você visualiza, ativa e monitora suas DAGs.
  #
  # Acesse em: http://localhost:8080
  # ─────────────────────────────────────────────────────────────────────────────
  airflow-webserver:
    <<: *airflow-common
    command: airflow webserver
    ports:
      - "8080:8080"
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s


# ─── Volumes persistentes ─────────────────────────────────────────────────────
# Dados que sobrevivem mesmo quando os containers são parados ou removidos.
# ─────────────────────────────────────────────────────────────────────────────
volumes:
  postgres_data:   # metadados do Airflow
  minio_data:      # arquivos salvos no MinIO
  airflow_logs:    # logs do Airflow (volume gerenciado pelo Docker para evitar problemas de permissão)